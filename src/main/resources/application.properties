spring.application.name=back-Kaizer

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP pool---
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:900000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONN_TIMEOUT_MS:20000}
spring.datasource.hikari.pool-name=SupabaseHikariPool

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:4173,http://127.0.0.1:3000,https://kaizer-front.vercel.app,https://*.vercel.app,https://*.onrender.com}
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-minutes=${JWT_EXP_MINUTES:1440}
